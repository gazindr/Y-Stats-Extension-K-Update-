<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Y-Stats-Extension - Настройки</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="popup-container">
            <div class="popup-header">
                <h1>Y-Stats-Extension</h1>
                <p class="popup-subtitle">Настройки расширения</p>
                <a href="https://games.yandex.ru/console/applications" target="_blank" class="console-link">
                    <span>Консоль разработчика</span>
                    <svg class="link-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 8.66667V12.6667C12 13.0203 11.8595 13.3594 11.6095 13.6095C11.3594 13.8595 11.0203 14 10.6667 14H3.33333C2.97971 14 2.64057 13.8595 2.39052 13.6095C2.14048 13.3594 2 13.0203 2 12.6667V5.33333C2 4.97971 2.14048 4.64057 2.39052 4.39052C2.64057 4.14048 2.97971 4 3.33333 4H7.33333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 2H14V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6.66666 9.33333L14 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
            </div>

            <div class="popup-content">
                <div class="setting-item">
                    <div class="setting-label">
                        <label for="enabled-toggle">Показывать блок статистики</label>
                        <p class="setting-description">Включить или выключить отображение блока на странице</p>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="enabled-toggle" checked />
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="setting-item">
                    <div class="setting-label">
                        <label for="request-delay">Задержка между запросами (мс)</label>
                        <p class="setting-description">
                            Время ожидания между запросами к API для избежания блокировки
                        </p>
                    </div>
                    <div class="input-group">
                        <input
                            type="number"
                            id="request-delay"
                            min="100"
                            max="5000"
                            step="100"
                            value="500"
                        />
                        <span class="input-suffix">мс</span>
                    </div>
                </div>

                <div class="status-message" id="status-message"></div>

                <button class="save-button" id="save-button">Сохранить настройки</button>

                <div class="popup-footer">
                    <p class="footer-note">
                        Настройки вступят в силу при следующем обновлении страницы
                    </p>
                </div>
            </div>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
